<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Paper Towels</title>
<style>
  /* Ultra-minimum + mega czytelność na telefonie */
  html, body {
    margin: 0;
    padding: 0;
    background: #fff;
    color: #000;
    font-family: Arial, Helvetica, sans-serif;
  }

  main {
    min-height: 100dvh;
    display: grid;
    place-items: center;
    padding: 5vw;
    box-sizing: border-box;
    text-align: center;
    line-height: 1.25;
  }

  h1 {
    font-size: 14vw;    /* OGROMNY nagłówek na mobile */
    margin: 0 0 5vw 0;
    color: #0A63A8;
    letter-spacing: 0.02em;
  }

  p {
    font-size: 8vw;     /* OGROMNY tekst na mobile */
    margin: 0;
  }

  /* Umiarkowanie na tablet/desktop */
  @media (min-width: 768px) {
    h1 { font-size: 8vw; }
    p  { font-size: 4vw; }
  }
  @media (min-width: 1200px) {
    h1 { font-size: 88px; }
    p  { font-size: 48px; }
  }
</style>
</head>
<body>
  <main>
    <div>
      <h1>PAPER TOWELS</h1>
      <p>If the paper towels have run out, please contact the Facility Department.</p>
    </div>
  </main>
</body>
</html>
