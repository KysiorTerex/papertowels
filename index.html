If the paper towels have run out, please contact the Facility Department
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Paper Towels</title>
<style>
  /* Mobile‑first: duże, responsywne fonty */
  html, body {
    margin: 0;
    padding: 0;
    background: #ffffff;
    color: #000000;
    font-family: Arial, Helvetica, sans-serif;
  }

  .wrap {
    min-height: 100dvh;            /* pełna wysokość ekranu, w tym mobilnego */
    display: grid;
    place-items: center;
    padding: 4vw;                  /* bezpieczne marginesy */
    box-sizing: border-box;
  }

  .card {
    text-align: center;
    line-height: 1.25;
    max-width: 90ch;               /* żeby w poziomie nie było za szeroko */
  }

  h1 {
    font-size: 10vw;               /* BARDZO duży nagłówek na telefonie */
    letter-spacing: 0.04em;
    margin: 0 0 4vw 0;
    color: #0A63A8;                /* firmowy akcent (można zmienić lub wyłączyć) */
  }

  p {
    font-size: 6vw;                /* duży, czytelny tekst instrukcji */
    margin: 0;
  }

  /* Umiarkowanie zmniejszamy na tabletach i desktopach */
  @media (min-width: 768px) {
    h1 { font-size: 6vw; }
    p  { font-size: 3.2vw; }
  }

  /* Na dużych monitorach ograniczamy do wartości pikselowych */
  @media (min-width: 1200px) {
    h1 { font-size: 72px; }
    p  { font-size: 40px; }
  }
</style>
</head>
<body>
  <main class="wrap">
    <div class="card">
      <h1>PAPER TOWELS</h1>
      <p>If the paper towels have run out, please contact the Facility Department.</p>
    </div>
  </main>
</body>
</html>
